# Generators
generators:
  - name: boilerplate
    description: Generate boilerplate code for handlers, services, repositories
    pattern: "**/*.go"
    exclude: "**/*_test.go"
    template: boilerplate.tmpl

  - name: tests
    description: Generate table-driven tests for all functions
    pattern: "**/*.go"
    exclude: "**/*_test.go"
    template: table_driven_test.tmpl

  - name: mocks
    description: Generate mocks for interfaces
    pattern: "**/interfaces.go"
    template: mockgen.tmpl

  - name: docs
    description: Generate GoDoc comments
    pattern: "**/*.go"
    template: godoc.tmpl

# Commands
commands:
  generate:
    description: Generate code from templates
    usage: caveman generate --package <package-name>

  test:
    description: Generate tests for a package
    usage: caveman test --package <package-name>

  mock:
    description: Generate mocks for interfaces
    usage: caveman mock --input <interface-file> --output <output-file>

  docs:
    description: Generate documentation
    usage: caveman docs --package <package-name>
