    }

    // {{.Action}} performs {{.Action}}
    func (r *{{.Name}}Repository) {{.Action}}(ctx context.Context) error {
        // TODO: Implement {{.Action}}
        return nil
    }

  test: |
    package {{.Package}}

    import (
        "testing"
    )

    func Test{{.Name}}_{{.Action}}(t *testing.T) {
        tests := []struct {
            name    string
