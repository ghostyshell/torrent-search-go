# Docker Compose — torrent-search-go
#
# Runs the Go backend and its optional FlareSolverr dependency locally.
# For production deployments, adapt environment variables to your platform.
#
# Usage:
#   docker compose up          # start both services
#   docker compose up app      # start only the Go backend

version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      NODE_ENV: "${NODE_ENV:-development}"
      HOST: "0.0.0.0"
      # PORT is injected by the hosting platform in production;
      # set it here only for local development.
      PORT: "${PORT:-3001}"

      # Database
      MONGODB_URI: "${MONGODB_URI}"
      MONGODB_DB: "${MONGODB_DB:-torrent_search}"
      MONGO_USERNAME: "${MONGO_USERNAME:-}"
      MONGO_PASSWORD: "${MONGO_PASSWORD:-}"

      # Session & encryption
      SESSION_SECRET: "${SESSION_SECRET}"
      REAL_DEBRID_ENCRYPTION_KEY: "${REAL_DEBRID_ENCRYPTION_KEY:-}"

      # Google APIs
      GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON}"
      GOOGLE_CUSTOM_SEARCH_ENGINE_ID: "${GOOGLE_CUSTOM_SEARCH_ENGINE_ID}"
      GOOGLE_CALLBACK_URL: "${GOOGLE_CALLBACK_URL}"

      # External integrations (optional)
      REAL_DEBRID_API_KEY: "${REAL_DEBRID_API_KEY:-}"
      # CORS
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      ADDITIONAL_CORS_ORIGINS: "${ADDITIONAL_CORS_ORIGINS:-}"

      # FlareSolverr (needed for 1337x scraper)
      FLARE_SOLVERR_URL: "http://flaresolverr:8191"
      HIDDENBAY_URL: "${HIDDENBAY_URL:-}"

      # Logging
      LOG_LEVEL: "${LOG_LEVEL:-debug}"
      LOG_DIR: /app/logs

      # Cache
      STREAM_URL_TTL_SECONDS: "${STREAM_URL_TTL_SECONDS:-72000}"

      # Security
      MONITORING_IP_ALLOWLIST: "${MONITORING_IP_ALLOWLIST:-}"
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD:-}"
      ALLOWED_EMAILS: "${ALLOWED_EMAILS:-}"

    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3001}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      flaresolverr:
        condition: service_healthy

  # FlareSolverr — Cloudflare bypass for scraping 1337x.
  # Remove this service if you do not need the 1337x scraper.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      LOG_LEVEL: info
    ports:
      - "8191:8191"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8191/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  app_logs:
