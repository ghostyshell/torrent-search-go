<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#020617"/>
  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#0F172A" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ADD8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Cyan glow orb -->
  <circle cx="600" cy="315" r="280" fill="#00ADD8" fill-opacity="0.04"/>
  <circle cx="600" cy="315" r="180" fill="#00ADD8" fill-opacity="0.06"/>
  <!-- Speed indicator arc -->
  <circle cx="600" cy="315" r="220" stroke="#00ADD8" stroke-width="2" stroke-opacity="0.2" fill="none" stroke-dasharray="600 1000"/>
  <circle cx="600" cy="315" r="220" stroke="url(#glow)" stroke-width="3" fill="none" stroke-dasharray="460 1000" filter="url(#blur)"/>
  <!-- Go gopher-inspired brackets -->
  <text x="120" y="360" font-family="JetBrains Mono, monospace" font-size="200" fill="#0F172A" font-weight="700">{"}</text>
  <!-- Main title -->
  <text x="600" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="#F8FAFC">torrent-search-go</text>
  <!-- Subtitle -->
  <text x="600" y="345" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="32" fill="#00ADD8">High-Performance Torrent Search Backend</text>
  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" fill="#64748B">Go · MongoDB · Real-Debrid · 7 Indexers · GPL-3.0</text>
  <!-- Bottom border accent -->
  <rect x="0" y="610" width="1200" height="4" fill="url(#glow)"/>
</svg>
